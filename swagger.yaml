      summary: Allow a guest player to join a game
      description: |
        If the name entered is an empty string, a name must be randomly generated that conforms to the structure "[5 letters][3 numbers]" (e.g. valid123, ifjru483, ofijr938) where there are no repetitions of numbers or characters within the same name
      tags:
        - "Iteration 3 (New)"
        # - "By Topic: Playing a game"
      parameters:
        - $ref: '#/components/body/PlayerJoin'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/return/PlayerJoin'
        400:
          description: |
            If any of the following are true:
            - Name contains invalid characters. Valid characters are alphanumeric and spaces.
            - Name of user entered is not unique (compared to other users who have already joined)
            - Game Id does not refer to a valid game
            - Game is not in LOBBY state
          schema:
            $ref: '#/components/return/Error'
  /v1/player/{playerid}:
    get:
      summary: Status of guest player in game
      description: Get the status of a guest player that has already joined a game
      tags:
        # - "By Topic: Playing a game"
        - "Iteration 3 (New)"
      parameters:
        - $ref: '#/components/path/PlayerId'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/return/PlayerStatus'
        400:
          description: |
            If any of the following are true:
            - If player ID does not exist
          schema:
            $ref: '#/components/return/Error'
  /v1/player/{playerid}/question/{questionposition}:
    get:
      summary: Current question information for a player
      description: Get the information about a question that the guest player is on. Question position starts at 1
      tags:
        # - "By Topic: Playing a game"
        - "Iteration 3 (New)"
      parameters:
        - $ref: '#/components/path/PlayerId'
        - $ref: '#/components/path/QuestionPosition'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/group/QuizQuestionPublic'
        400:
          description: |
            If any of the following are true:
            - If player ID does not exist
            - If question position is not valid for the game this player is in
            - If game is not currently on this question
            - Game is in LOBBY, QUESTION_COUNTDOWN, FINAL_RESULTS or END state
          schema:
            $ref: '#/components/return/Error'
  /v1/player/{playerid}/question/{questionposition}/answer:
    put:
      summary: Player submission of answers(s)
      description: |
        Allow the current player to submit answer(s) to the currently active question. Question position starts at 1
        Note: An answer can be re-submitted once first selection is made, as long as game is in the right state
      tags:
        # - "By Topic: Playing a game"
        - "Iteration 3 (New)"
      parameters:
        - $ref: '#/components/body/PlayerQuestionAnswer'
        - $ref: '#/components/path/PlayerId'
        - $ref: '#/components/path/QuestionPosition'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/return/Empty'
        400:
          description: |
            If any of the following are true:
            - If player ID does not exist
            - If question position is not valid for the game this player is in
            - Game is not in QUESTION_OPEN state
            - If game is not currently on this question
            - Answer IDs are not valid for this particular question
            - There are duplicate answer IDs provided
            - Less than 1 answer ID was submitted
          schema:
            $ref: '#/components/return/Error'
  /v1/player/{playerid}/question/{questionposition}/results:
    get:
      summary: Results for a question
      description: Get the results for a particular question of the game a player is playing in. Question position starts at 1
      tags:
        # - "By Topic: Playing a game"
        - "Iteration 3 (New)"
      parameters:
        - $ref: '#/components/path/PlayerId'
        - $ref: '#/components/path/QuestionPosition'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/group/QuestionResults'
        400:
          description: |
            If any of the following are true:
            - If player ID does not exist
            - If question position is not valid for the game this player is in
            - Game is not in ANSWER_SHOW state
            - If game is not currently on this question
          schema:
            $ref: '#/components/return/Error'
  /v1/player/{playerid}/results:
    get:
      summary: Final results for a game
      description: Get the final results for a whole game a player is playing in
      tags:
        # - "By Topic: Playing a game"
        - "Iteration 3 (New)"
      parameters:
        - $ref: '#/components/path/PlayerId'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/return/ResultsFinal'
        400:
          description: |
            If any of the following are true:
            - If player ID does not exist
            - Game is not in FINAL_RESULTS state
          schema:
            $ref: '#/components/return/Error'

  /v1/clear:
    delete:
      summary: Reset the state of the application back to the start/its initial state.
      description: Wipe all details (users, quizzes) back to the beggining as if the data structure is fresh.
      tags:
        # - "By Topic: Other"
        - "Iteration 2 (Using Iteration 1)"
      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/return/Empty'
  
  /v1/game/{gameid}/player/{playerid}/hint:
    get: 
      summary: Provide a hint to a player on their current question
      description: Provides a hint to the player generated by an LLM for their current question if they are performing poorly or taking too long to answer on average. Hinting will be disabled if the player's performance improves beyond the threshold.
      tags:
        - "Iteration 3 (Open-Ended)"
      parameters: 
        - $ref: '#/components/path/GameId'
        - $ref: '#/components/path/PlayerId'
      responses: 
        200:
          description: Successfully returns a hint
          schema:
            $ref: '#/components/return/HintResponse'
          examples:
            application/json:
              hint: "Option 1 is false"
        400:
          description: |
            Invalid game or player state if:
            - GameId does not refer to a valid game
            - PlayerId does not refer to a valid player in the game
            - There is no active question for the player
          schema: 
            $ref: '#/components/return/Error'
          examples:
            application/json:
              error: "Specific error message"
        403:
          description: |
            Hint conditions not met if any of the following are true:
            - Game is still on or before question 2
            - Player's score is not below the average score of other players
            - If player is only player in game, score is above 50%
            - Time spent on question is below the threshold (80% question time of the time limit for current question)
          schema:
            $ref: '#/components/return/Error'
          examples:
            application/json:
              error: "Specific error message"


  /v1/admin/quiz/{quizid}/question/{questionid}/upload:
    put:
      summary: Upload an attachment to a quiz question.
      description: Uploads an attachment to the server, and attaches to a specified quiz question.
      tags:
      # - "By Topic: Quiz Management"
        - "Iteration 3 (Open-Ended)"
      parameters:
        - $ref: '#/components/path/QuizId'
        - $ref: '#/components/path/QuestionId'
        - $ref: '#/components/header/Session'
        - name: file
          in: formData
          description: The file to upload
          required: true
          type: file

      responses:
        200:
          description: OK
          schema:
            $ref: '#/components/return/Empty'
        400:
          description: |
            If any of the following are true:
            - Question Id does not refer to a valid question within this quiz
            - No file uploaded
            - File with same name is already attached to question
          schema:
            $ref: '#/components/return/Error'
        401:
          description: |
            Session is empty or invalid (does not refer to valid logged in user session)
          schema:
            $ref: '#/components/return/Error'
        403:
          description: |
            Valid session is provided, but user is not an owner of this quiz or quiz doesn't exist
          schema:
            $ref: '#/components/return/Error'
    delete:
      summary: Remove a file attachment from a quiz question
      description: Deletes a file URL from a question's list of file attachments, if the session is valid and the user has permission.
      tags:
        - "Iteration 3 (Open-Ended)"
      consumes:
        - application/json
      parameters:
        - name: session
          in: header
          description: Session ID of the authenticated admin
          required: true
          type: string
        - name: quizid
          in: path
          description: ID of the quiz
          required: true
          type: integer
        - name: questionid
          in: path
          description: ID of the question
          required: true
          type: integer
        - name: filename
          in: body
          description: The URL of the file to be removed
          required: true
          schema:
            type: object
            properties:
              filename:
                type: string
                example: "example.pdf"
      responses:
        '200':
          description: File successfully removed
          schema:
            type: object
            example: {}
        '400':
          description: File not found in uploads, or question not found.
          schema:
            $ref: '#/components/return/Error'
        '401':
          description: Session is empty or invalid (does not refer to valid logged-in user session)
          schema:
            $ref: '#/components/return/Error'
        '403':
          description: Valid session is provided, but user is not an owner of this quiz or quiz doesn't exist
          schema:
            $ref: '#/components/return/Error'
  
  /v1/admin/quiz/{quizid}/export:
    get:
      summary: Exports the current quiz to a JSON file.
      description: Exports the current quiz as a JSON file.
      tags:
        - "Iteration 3 (Open-Ended)"
      parameters:
        - name: quizid
          in: path
          required: true
          type: string
          description: The unique identifier for the quiz
        - name: session
          in: header
          required: true
          type: string
          description: The session token for the authenticated user
        - name: filename
          in: query
          required: false
          type: string
          description: Optional custom filename for the exported JSON file
      responses:
        200:
          description: Successfully exports and returns the quiz data as JSON.
          headers:
            Content-Disposition:
              description: Indicates that the response is a downloadable file with an optional filename.
              type: string
          schema:
            type: object
            example:
              quizId: 1
              name: "Sample Quiz"
              description: "A test quiz"
              timeCreated: 1691234567890
              timeLastEdited: 1691234567890
              timeLimit: 120
              thumbnailUrl: ""
              questions:
                - questionId: 1
                  question: "What is the capital of France?"
                  timeLimit: 30
                  points: 10
                  answerOptions:
                    - answerId: 1
                      answer: "Paris"
                      correct: true
                    - answerId: 2
                      answer: "London"
                      correct: false
              games: []
        401:
          description: Session is empty or invalid (does not refer to valid logged-in user session)
          schema:
            $ref: '#/components/return/Error'
        403:
          description: Valid session is provided, but user is not an owner of this quiz or quiz doesn't exist
          schema:
            $ref: '#/components/return/Error'

  /v1/admin/quiz/import:
    post:
      summary: Imports a JSON file into a new quiz.
      description: Upload a valid JSON file to create a new quiz.
      tags:
        - "Iteration 3 (Open-Ended)"
      parameters:
        - $ref: '#/components/header/Session'
        - name: file
          in: formData
          required: true
          type: file
          description: The JSON file to be uploaded
      responses:
        200:
          description: Successfully imports a JSON file into a new quiz
          schema:
            $ref: '#/components/return/QuizNew'
        400:
          description: Quiz could not be successfully imported
          schema:
            $ref: '#/components/return/Error'
        401:
          description: Session is empty or invalid (does not refer to valid logged-in user session)
          schema:
            $ref: '#/components/return/Error'
  
  /uploads/{filename}:
    get:
      summary: Retrieve a file by filename
      description: Verifies the user's access to the file and serves it if authorised.
      tags:
        - "Iteration 3 (Open-Ended)"
      parameters:
        - name: session
          in: header
          description: Session ID for user authentication
          required: true
          type: string
        - name: filename
          in: path
          description: Name of the file to be retrieved
          required: true
          type: string
      responses:
        '200':
          description: File retrieved successfully
          schema:
            type: string
            format: uri
        '400':
          description: No file attachments found for this user.
          schema:
            $ref: '#/components/return/Error'
        '401':
          description: Session is empty or invalid (does not refer to valid logged-in user session)
          schema:
            $ref: '#/components/return/Error'
        '403':
          description: Valid session is provided, but user is not authorised to access file.
          schema:
            $ref: '#/components/return/Error'








securityDefinitions:
  Iteration 3 Session Authentication:
    type: apiKey
    name: session
    in: header
